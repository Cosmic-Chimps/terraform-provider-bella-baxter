# GoReleaser configuration for terraform-provider-bella-baxter
# Builds cross-platform binaries following Terraform provider conventions.
# GPG signing for Terraform Registry can be enabled by setting GPG_FINGERPRINT
# and GPG_PASSPHRASE secrets (currently skipped — not yet registered).

version: 2

project_name: terraform-provider-bella-baxter

before:
  hooks:
    # GONOPROXY: fetch cosmic-chimps packages directly from GitHub, bypassing
    # proxy.golang.org cache. Needed because bella-baxter-go force-moves its
    # release tag after committing generated/ — the proxy may serve stale content.
    - sh -c "GONOSUMDB=github.com/cosmic-chimps/* GONOPROXY=github.com/cosmic-chimps/* go mod tidy"

builds:
  - env:
      - CGO_ENABLED=0
      - GONOSUMDB=github.com/cosmic-chimps/*
      - GONOPROXY=github.com/cosmic-chimps/*
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}}'
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - format: zip
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--yes"
      - "--pinentry-mode"
      - "loopback"
      - "--passphrase"
      - "{{ .Env.GPG_PASSPHRASE }}"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: 'Terraform Provider {{ .Tag }}'

changelog:
  disable: true
